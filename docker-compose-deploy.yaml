services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - '/etc/letsencrypt:/etc/letsencrypt'
    depends_on:
      - backend
      - frontend
    networks:
      - custom

  db:
    image: postgres:14.1-alpine
    container_name: db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    networks:
      - custom
  
  alembic_migrations:
    image: alembic_migrations
    container_name: alembic_migrations
    ports:
      - "8001:8001"
    environment:
      ALEMBIC_DATABASE_URL: "postgresql://postgres:postgres@db/postgres"
      REAL_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/postgres"
      APP_PORT: "8001"
    build:
      context: ./lmsback
      dockerfile: Dockerfile

    depends_on:
      - db
    command: sh ./run_migrations.sh
    networks:
      - custom
  
  backend:
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      ALEMBIC_DATABASE_URL: "postgresql://postgres:postgres@db/postgres"
      REAL_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/postgres"
      APP_PORT: "8000"
    build: 
      context: ./lmsback  # Point to your backend directory
      dockerfile: Dockerfile
    depends_on:
      - db 
      - alembic_migrations
    restart: always
    networks:
      - custom
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs

  frontend:
    build:
      context: ./lmsfront
    networks:
      - custom

networks:
  custom:
    driver: bridge

